{% load static %}
<!-- Header -->
<header id="header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 bg-transparent">
    <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
            <!-- Logo -->
            <a href="{% url 'home' %}" class="flex items-center gap-2 group">
                <i data-lucide="sparkles" class="w-8 h-8 text-white header-icon transition-colors"></i>
                <span class="font-serif text-2xl font-bold text-white header-text transition-colors">AleeLights</span>
            </a>

            <!-- Desktop Navigation -->
            <nav class="hidden lg:flex items-center gap-8">
                <a href="{% url 'home' %}#home" class="text-sm font-medium text-white header-link transition-colors hover:text-amber-500">Home</a>
                <a href="{% url 'home' %}#products" class="text-sm font-medium text-white header-link transition-colors hover:text-amber-500">Products</a>
                <a href="{% url 'home' %}#how-it-works" class="text-sm font-medium text-white header-link transition-colors hover:text-amber-500">About</a>
                <a href="{% url 'home' %}#portfolio" class="text-sm font-medium text-white header-link transition-colors hover:text-amber-500">Portfolio</a>
                <a href="{% url 'home' %}#testimonials" class="text-sm font-medium text-white header-link transition-colors hover:text-amber-500">Testimonials</a>
                <a href="{% url 'home' %}#contact" class="text-sm font-medium text-white header-link transition-colors hover:text-amber-500">Contact</a>
            </nav>

            <!-- Desktop Buttons -->
            <div class="hidden lg:flex items-center gap-4">

                <a href="tel:+923025329536" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg border border-white/30 text-white hover:bg-white/10 transition-colors header-btn-outline">
                    <i data-lucide="phone" class="w-4 h-4"></i>
                    Call Us
                </a>
                <a href="{% url 'home' %}#contact" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg bg-amber-500 text-white hover:bg-amber-600 transition-colors">
                    Get Quote
                </a>
                                <!-- Dark Mode Toggle -->
                <button id="dark-toggle" onclick="toggleDarkMode()" class="p-2 rounded-lg text-white hover:bg-white/10 header-btn-outline border border-white/30 transition-colors" aria-label="Toggle dark mode">
                    <i data-lucide="moon" class="w-5 h-5 dark-icon-moon"></i>
                    <i data-lucide="sun" class="w-5 h-5 dark-icon-sun hidden"></i>
                </button>
            </div>

            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="lg:hidden p-2 text-white header-icon" aria-label="Toggle menu">
                <i data-lucide="menu" class="w-6 h-6" id="menu-icon-open"></i>
                <i data-lucide="x" class="w-6 h-6 hidden" id="menu-icon-close"></i>
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="lg:hidden hidden bg-white border-b">
        <nav class="max-w-7xl mx-auto px-6 py-6 space-y-4">
            <a href="{% url 'home' %}#home" class="block text-gray-800 hover:text-amber-500 transition-colors py-2 mobile-nav-link">Home</a>
            <a href="{% url 'home' %}#products" class="block text-gray-800 hover:text-amber-500 transition-colors py-2 mobile-nav-link">Products</a>
            <a href="{% url 'home' %}#how-it-works" class="block text-gray-800 hover:text-amber-500 transition-colors py-2 mobile-nav-link">About</a>
            <a href="{% url 'home' %}#portfolio" class="block text-gray-800 hover:text-amber-500 transition-colors py-2 mobile-nav-link">Portfolio</a>
            <a href="{% url 'home' %}#testimonials" class="block text-gray-800 hover:text-amber-500 transition-colors py-2 mobile-nav-link">Testimonials</a>
            <a href="{% url 'home' %}#contact" class="block text-gray-800 hover:text-amber-500 transition-colors py-2 mobile-nav-link">Contact</a>
            <div class="pt-4 space-y-3 border-t">
                <button onclick="toggleDarkMode()" class="flex items-center justify-center gap-2 w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                    <i data-lucide="moon" class="w-4 h-4 dark-icon-moon"></i>
                    <i data-lucide="sun" class="w-4 h-4 dark-icon-sun hidden"></i>
                    <span class="dark-label-text">Dark Mode</span>
                </button>
                <a href="tel:+923025329536" class="flex items-center justify-center gap-2 w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                    <i data-lucide="phone" class="w-4 h-4"></i>
                    Call Us
                </a>
                <a href="{% url 'home' %}#contact" class="flex items-center justify-center w-full px-4 py-3 rounded-lg bg-amber-500 text-white hover:bg-amber-600 transition-colors mobile-nav-link">
                    Get Quote
                </a>
            </div>
        </nav>
    </div>
</header>
