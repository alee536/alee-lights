{% load static %}
<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AleeLights - Premium Luxury Outdoor Light Decoration Rentals</title>
    <meta name="description" content="Transform your special moments with premium outdoor lighting. Wedding, Birthday, Eid, Christmas lighting rentals in Lahore.">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: 'hsl(43, 74%, 52%)',
                            foreground: '#ffffff',
                            light: 'hsl(43, 74%, 92%)',
                        },
                        amber: {
                            500: 'hsl(43, 74%, 52%)',
                            600: 'hsl(43, 74%, 45%)',
                            700: 'hsl(43, 74%, 38%)',
                        },
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- Dark mode: no flash -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="font-sans text-gray-800 bg-white antialiased">
    
    {% include 'partials/header.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}
    {% include 'partials/floating_actions.html' %}

    <!-- Lucide Icons Init -->
    <script>lucide.createIcons();</script>
    
    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}?v=2"></script>
</body>
</html>
